app-id: com.indomitusgroup.indiaccounting
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

command: indiaccounting

finish-args:
  # Display (Tauri / WebKitGTK)
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU acceleration for the WebKitGTK webview
  - --device=dri
  # Outbound network is required for two features that cannot use a portal:
  #   * License activation / verification — HTTPS requests to the license server
  #     (api.indomitusgroup.com) via reqwest.
  #   * Sending invoices and estimates by email — a direct SMTP connection to the
  #     user's own configured mail server via lettre.
  - --share=network

modules:
  # Receipt OCR shells out to the native `tesseract` binary and its leptonica dependency.
  - name: leptonica
    config-opts:
      - --disable-static
    cleanup:
      - /include
      - /lib/*.a
      - /lib/*.la
      - /lib/pkgconfig
    sources:
      - type: archive
        url: https://github.com/DanBloomberg/leptonica/releases/download/1.84.1/leptonica-1.84.1.tar.gz
        sha256: 2b3e1254b1cca381e77c819b59ca99774ff43530209b9aeb511e1d46588a64f6

  - name: tesseract
    config-opts:
      - --disable-static
      - --disable-openmp
      - --without-archive
    cleanup:
      - /include
      - /lib/*.a
      - /lib/*.la
      - /lib/pkgconfig
    sources:
      - type: archive
        url: https://github.com/tesseract-ocr/tesseract/archive/refs/tags/5.5.0.tar.gz
        sha256: f2fb34ca035b6d087a42875a35a7a5c4155fa9979c6132365b1e5a28ebc3fc11
      # English "fast" model (~4 MB), installed where tesseract looks by default
      # (/app/share/tessdata). If a build ever can't find it, add
      # `--env=TESSDATA_PREFIX=/app/share/tessdata` to finish-args.
      - type: file
        url: https://github.com/tesseract-ocr/tessdata_fast/raw/4.1.0/eng.traineddata
        sha256: 7d4322bd2a7749724879683fc3912cb542f19906c83bcc1a52132556427170b2
    post-install:
      - install -Dm644 eng.traineddata /app/share/tessdata/eng.traineddata

  - name: indiaccounting
    buildsystem: simple
    build-commands:
      - install -Dm755 indiaccounting ${FLATPAK_DEST}/bin/indiaccounting
      - install -Dm644 com.indomitusgroup.indiaccounting.desktop ${FLATPAK_DEST}/share/applications/com.indomitusgroup.indiaccounting.desktop
      - install -Dm644 com.indomitusgroup.indiaccounting.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.indomitusgroup.indiaccounting.metainfo.xml
      - install -Dm644 icons/32x32.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/com.indomitusgroup.indiaccounting.png
      - install -Dm644 icons/128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.indomitusgroup.indiaccounting.png
      - install -Dm644 icons/256x256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/com.indomitusgroup.indiaccounting.png
      - install -Dm644 icons/512x512.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/com.indomitusgroup.indiaccounting.png
    sources:
      - type: archive
        url: https://downloads.indomitusgroup.com/indiaccounting/indiaccounting-1.2.0-linux-x86_64.tar.gz
        # Flatpak SHA256 — TODO: replace with the real hash of the published 1.1.0
        # tarball before building (sha256sum indiaccounting-1.1.0-linux-x86_64.tar.gz).
        sha256: ff84db96486c28693af320263ca92d8244cdf8655a7918276fa7595c22c7f130

